name: Build & Deploy Docker

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/misaaimis .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/misaaimis
      #Deploy + inject DB connection string
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/misaaimis
            docker stop misaaimis || true
            docker rm misaaimis || true
            docker run -d --name misaaimis -p 5000:8080 -e ConnectionStrings__Misa2Thang="${{ secrets.DB_CONNECTION_STRING }}" ${{ secrets.DOCKER_USERNAME }}/misaaimis
